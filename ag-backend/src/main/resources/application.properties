spring.application.name=ag-backend
server.port=8080

# ─── Base de données MySQL (XAMPP) ────────────────────────────────────────────
# URL de connexion : localhost, port 3306, base ag_voting
# createDatabaseIfNotExist=true → crée automatiquement la base si elle n'existe pas
# useSSL=false → désactive SSL (inutile en local)
# serverTimezone=UTC → évite les erreurs de fuseau horaire avec MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ag_voting?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Pilote JDBC MySQL 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Identifiants MySQL XAMPP (mot de passe vide par défaut)
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# Dialecte SQL pour MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto=update : Hibernate met à jour les tables sans supprimer les données
# Alternatives : create-drop (recrée à chaque démarrage), validate (vérifie seulement)
spring.jpa.hibernate.ddl-auto=update

# Affichage des requêtes SQL dans la console (mettre false en production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT (JSON Web Token) ─────────────────────────────────────────────────────
# Clé secrète pour signer les tokens (doit être longue et complexe en production)
app.jwt.secret=agVotingSecretKey2024SuperLongSecretKeyForHS256Algorithm

# Durée de validité du token : 86400000 ms = 24 heures
app.jwt.expiration=86400000

# ─── Upload de fichiers ────────────────────────────────────────────────────────
# Taille max d'un fichier uploadé (10 MB)
spring.servlet.multipart.max-file-size=10MB
# Taille max de la requête multipart totale
spring.servlet.multipart.max-request-size=10MB
# Activer explicitement le support multipart
spring.servlet.multipart.enabled=true
